<!DOCTYPE html>
<html>
<head>
    <title>Discussion Hub | Group {{ group_id }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { margin: 0; font-family: 'Poppins'; background: #09040c; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        .chat-header { padding: 20px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .chat-header h2 { margin: 0; font-size: 1.2rem; color: #bc6ff1; } /* Purple accent */
        
        .message-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Message Bubbles */
        .msg { max-width: 70%; padding: 12px 18px; border-radius: 15px; position: relative; line-height: 1.4; }
        .msg.mentor { align-self: flex-start; background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff8833; }
        .msg.student { align-self: flex-end; background: rgba(188, 111, 241, 0.1); border: 1px solid #bc6ff133; text-align: right; }
        
        .sender-info { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .mentor .sender-info { color: #00ff88; }
        .student .sender-info { color: #bc6ff1; }
        
        .time { font-size: 0.6rem; opacity: 0.5; display: block; margin-top: 5px; }
        
        .input-area { padding: 20px; background: #120816; border-top: 1px solid rgba(255,255,255,0.1); }
        .input-form { display: flex; gap: 10px; max-width: 900px; margin: 0 auto; }
        input { flex: 1; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; }
        button { padding: 0 25px; background: #bc6ff1; border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-header">
        <h2>Group {{ group_id }} Discussion</h2>
        <small style="color: #6b7280;">Batch: {{ session_name }}</small>
    </div>

    <div class="message-container" id="chatBox">
        {% for m in messages %}
        <div class="msg {{ m.role }}">
            <span class="sender-info">{{ m.sender }} ({{ m.role }})</span>
            <div>{{ m.text }}</div>
            <span class="time">{{ m.time }}</span>
        </div>
        {% endfor %}
    </div>

    <div class="input-area">
        <form class="input-form" method="POST">
            <input type="text" name="message" placeholder="Type your message here..." required autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        // Auto scroll to bottom
        const chatBox = document.getElementById('chatBox');
        chatBox.scrollTop = chatBox.scrollHeight;
    </script>

</body>
</html>
