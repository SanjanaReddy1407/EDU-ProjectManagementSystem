<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Login | EDU-PMS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --emerald: #00ff88;
            --forest-green: #0a2e1f;
            --bg-dark: #050a08;
            --glass: rgba(255, 255, 255, 0.03);
            --error-red: #ff4d4d;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at bottom left, #0d1f18, #050a08);
            color: #e0e6f1;
            overflow: hidden;
        }

        /* Background Glow Decor */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--emerald);
            filter: blur(150px);
            border-radius: 50%;
            opacity: 0.1;
            z-index: -1;
        }

        .login-card {
            background: var(--glass);
            border: 1px solid rgba(0, 255, 136, 0.1);
            padding: 50px 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h2 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .login-card p {
            font-size: 0.85rem;
            color: var(--emerald);
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: #8a99af;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 12px;
            color: #fff;
            font-family: 'Poppins';
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--emerald);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
            background: rgba(0, 0, 0, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: var(--emerald);
            color: #050a08;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
            filter: brightness(1.1);
        }

        .flash-msg {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid var(--error-red);
            color: var(--error-red);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--emerald);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="login-card">
        <h2>Mentor Portal</h2>
        <p>Faculty Authentication</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-msg">⚠️ {{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form action="/men_login" method="POST">
            <div class="input-group">
                <label>Mentor ID (Faculty ID)</label>
                <input type="text" name="mentor_id" required>
            </div>

            <div class="input-group">
                <label>Security Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-login">Access Dashboard</button>
        </form>

        <a href="/" class="back-link">← Return to Welcome Page</a>
    </div>

</body>
</html>
