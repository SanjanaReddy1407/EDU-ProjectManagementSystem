<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome - Group & Project Management</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    /* Variables for easy color management */
    :root {
      --student-color: #390441;
      --mentor-color: #0a0a3e; /* darkblue */
      --admin-color: #073207;
      --accent-color: #00bfff;
    }

    /* Background & Body */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      font-family: 'Poppins', sans-serif;
      color: #e0e6f1;
      overflow: hidden;
    }

    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
      filter: brightness(0.4);
    }

    /* Header Styling */
    .main-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 50px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 191, 255, 0.3);
      z-index: 1000;
    }

    .header-logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent-color);
      letter-spacing: 1px;
    }

    .header-nav {
      display: flex;
      gap: 30px;
    }

    .nav-tab {
      text-decoration: none;
      color: #e0e6f1;
      font-weight: 500;
      font-size: 0.95rem;
      position: relative;
      transition: color 0.3s ease;
    }

    .nav-tab:hover {
      color: var(--accent-color);
    }

    .nav-tab::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -5px;
      left: 0;
      align-items: center;
      background-color: var(--accent-color);
      transition: width 0.3s ease;
    }

    /* Updated Header Styling to prevent overflow */
.main-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    /* Use box-sizing to ensure padding doesn't add to the width */
    box-sizing: border-box; 
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 5%; /* Using percentage for padding helps on different screens */
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0, 191, 255, 0.3);
    z-index: 1000;
}

.header-nav {
    display: flex;
    gap: 40px; /* Reduced gap slightly */
    flex-shrink: 0; /* Prevents the nav from squishing */
}

/* Ensure images/video don't cause horizontal scroll */
html, body {
    max-width: 100%;
    overflow-x: hidden;
}

    .nav-tab:hover::after {
      width: 90%;
    }

    /* Welcome Box Container */
    .welcome-box {
      background: rgba(0, 0, 0, 0.55);
      padding: 50px 60px;
      border-radius: 24px;
      box-shadow: 0 0 40px rgba(0, 191, 255, 0.3);
      text-align: center;
      max-width: 800px;
      width: 90%;
      animation: fadeInUp 1.2s ease forwards;
      opacity: 0;
      transform: translateY(40px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Gradient Animated Title */
    .title {
      font-size: 2rem;
      background: linear-gradient(270deg, #00bfff, #7f00ff, #00ffd5, #00bfff);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 8s ease infinite;
      margin-bottom: 20px;
      font-weight: 700;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 1rem;
      margin-bottom: 40px;
      color: #b0c4decc;
      font-weight: 400;
      line-height: 1.6;
    }

    /* Role Buttons Layout */
    .button-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .role-button {
      flex: 1;
      min-width: 150px;
      padding: 25px 15px;
      border-radius: 12px;
      cursor: pointer;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .role-button:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
      filter: brightness(1.2);
    }

    .role-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .role-name {
      font-weight: 600;
      font-size: 1.1rem;
    }

    /* Individual Button Colors */
    #studentBtn { background-color: var(--student-color); }
    #mentorBtn { background-color: var(--mentor-color); }
    #adminBtn { background-color: var(--admin-color); }

    /* Animations */
    @keyframes gradientShift {
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main-header { padding: 15px 20px; }
      .welcome-box { padding: 30px 20px; }
      .title { font-size: 1.5rem; }
      .button-container { flex-direction: column; }
    }
  </style>
</head>
<body>

  <video autoplay muted loop id="bg-video">
    <source src="/static/3255275-uhd_3840_2160_25fps.mp4" type="video/mp4">
  </video>

  <header class="main-header">
    <div class="header-logo">EDU-PMS</div>
    <nav class="header-nav">
        <a href="/history" class="nav-tab">History</a>
        <a href="/faculty_details" class="nav-tab">Faculty</a>
        <a href="/students_list" class="nav-tab">Students List</a>
    </nav>
  </header>

  <div class="welcome-box">
    <h1 class="title">Authentication and Analysis-Based Group and Project Management System</h1>
    <p class="subtitle">
      Securely log in and collaborate with your team. Form balanced groups, <br>
      manage projects with ease, and track progress seamlessly.
    </p>

    <div class="button-container">
      
      <a href="/stu_login" id="studentBtn" class="role-button">
        <span class="role-icon">🧑‍🎓</span>
        <span class="role-name">Student</span>
      </a>
      

      
      <a href="/men_login" id="mentorBtn" class="role-button">
        <span class="role-icon">👨‍🏫</span>
        <span class="role-name">Mentor</span>
      </a>
    

    
    <a href="/adm_login" id="adminBtn" class="role-button">
        <span class="role-icon">👑</span>
        <span class="role-name">Admin</span>
      </a>
    
    </div>
  </div>

  <script>
    // Optional: Log selection for debugging
    function selectRole(role) {
        console.log("Role selected: " + role);
    }
  </script>

</body>
</html>
