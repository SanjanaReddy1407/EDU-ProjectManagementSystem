<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - EDU-PMS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
      --gold: #ffcc00;
      --gold-glow: rgba(255, 204, 0, 0.3);
      --bg-dark: #080808;
      --card-bg: rgba(20, 20, 20, 0.8);
      --error-red: #ff4d4d;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-dark);
      color: #e0e6f1;
      overflow: hidden;
      /* Deep Radial Gradient for Premium Look */
      background: radial-gradient(circle at center, #1a1a1a 0%, #080808 100%);
    }

    /* Royal Gold Glow */
    .glow {
      position: absolute;
      width: 450px;
      height: 450px;
      background: var(--gold);
      filter: blur(180px);
      border-radius: 50%;
      opacity: 0.08;
      z-index: -1;
      top: -10%;
      left: -10%;
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      padding: 60px 45px;
      border-radius: 35px;
      border: 1px solid rgba(255, 204, 0, 0.15);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card h2 {
      margin: 0 0 8px 0;
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    .admin-tag {
      font-size: 0.75rem;
      color: var(--gold);
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-weight: 600;
      display: inline-block;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 5px;
    }

    .input-group {
      margin-bottom: 25px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 10px;
      margin-left: 5px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #a0a0a0;
    }

    .input-group input {
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      color: white;
      font-family: 'Poppins';
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .input-group input:focus {
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 20px var(--gold-glow);
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%);
      color: #000;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.4s;
      margin-top: 15px;
      box-shadow: 0 10px 25px rgba(255, 204, 0, 0.2);
    }

    .login-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(255, 204, 0, 0.4);
      filter: brightness(1.1);
    }

    .back-link {
      display: inline-block;
      margin-top: 30px;
      font-size: 0.85rem;
      color: #666;
      text-decoration: none;
      transition: 0.3s;
    }

    .back-link:hover {
      color: var(--gold);
    }

    .flash-error {
      color: var(--error-red);
      font-size: 0.85rem;
      background: rgba(255, 77, 77, 0.05);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 77, 77, 0.2);
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="glow"></div>

  <div class="login-card">
    <h2>System Admin</h2>
    <span class="admin-tag">Master Access</span>

    <form action="/adm_login" method="POST">
      <div class="input-group">
        <label>Administrator Email</label>
        <input type="email" name="email"  required>
      </div>

      <div class="input-group">
        <label>Master Password</label>
        <input type="password" name="password"  required>
      </div>

      <button type="submit" class="login-btn">Log Into Console</button>
    </form>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-error">⚠️ {{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <a href="/" class="back-link">← Return to Portal Interface</a>
  </div>

</body>
</html>
